<section class="bg-[#F0EAE4] p-16">
  <div class="max-w-7xl mx-auto">

    <!-- Header -->
    <div class="flex items-start justify-between mb-10">
      <div>
        <h2 class="font-bold text-[#3D2314] text-[1.8rem] sm:text-[2rem]">
          Featured Products
        </h2>
        <p class="text-[#7A6E66] text-sm mt-1">Discover our handpicked selection</p>
      </div>
      <a routerLink="/products" class="inline-flex items-center gap-1 border border-[#C5BDB4] text-[#3D2314] text-sm font-medium px-4 py-2 rounded-lg hover:bg-[#3D1F14] hover:text-white hover:border-[#3D1F14] transition-all">
        View All
        <svg xmlns="http://www.w3.org/2000/svg" class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
          <path stroke-linecap="round" stroke-linejoin="round" d="M17 8l4 4m0 0l-4 4m4-4H3"/>
        </svg>
      </a>
    </div>

    <!-- Loading -->
    @if (isLoading()) {
      <div class="flex justify-center py-20">
        <div class="w-8 h-8 border-4 border-[#3D1F14] border-t-transparent rounded-full animate-spin"></div>
      </div>
    }

    <!-- Error -->
    @if (error()) {
      <p class="text-center text-red-500 py-10">{{ error() }}</p>
    }

    <!-- Products grid -->
    @if (!isLoading() && !error()) {
      @if (products().length === 0) {
        <p class="text-center text-[#7A6E66] py-10">No products available yet.</p>
      } @else {
        <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-5">
          @for (product of products(); track product.id) {
            <app-product-card [item]="product"></app-product-card>
          }
        </div>
      }
    }

  </div>
</section>
