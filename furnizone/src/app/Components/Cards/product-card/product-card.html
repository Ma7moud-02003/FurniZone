<div class="group relative flex flex-col overflow-hidden rounded-2xl border border-stone-100 bg-white p-3 transition-all hover:shadow-md">
  
  <div class="relative aspect-square w-full overflow-hidden rounded-xl bg-stone-100">
    <img [routerLink]="['/pd_details', item().id]" [src]="item().imageUrl" [alt]="item().name" class="h-full w-full object-cover transition-transform duration-500 group-hover:scale-105" loading="lazy" />
<button 
  type="button" 
  (click)="toggleWishlist(item().id)"
  [ngClass]="{
    'text-rose-500': checkIfProductIsWishlisted(item().id), 
    'text-stone-700': !checkIfProductIsWishlisted(item().id)
  }"
  class="absolute top-2.5 right-2.5 z-10 flex h-9 w-9 items-center justify-center rounded-full bg-white shadow-sm transition-all hover:scale-105 active:scale-95 hover:text-rose-500">
  <svg 
    class="h-5 w-5 transition-colors duration-300" 
    [attr.fill]="checkIfProductIsWishlisted(item().id) ? 'currentColor' : 'none'" 
    viewBox="0 0 24 24" 
    stroke="currentColor" 
    stroke-width="1.6">
    <path stroke-linecap="round" stroke-linejoin="round" d="M4.318 6.318a4.5 4.5 0 000 6.364L12 20.364l7.682-7.682a4.5 4.5 0 00-6.364-6.364L12 7.636l-1.318-1.318a4.5 4.5 0 00-6.364 0z" />
  </svg>
</button>
  </div>

  <div class="mt-3 flex flex-1 flex-col px-1">
    
    <h3 class="mt-1 text-base font-bold text-[#3B2417] line-clamp-1">
      <a [routerLink]="['/pd_details', item().id]" class="hover:underline">
        {{ item().name }}
      </a>
    </h3>
    
    <div class="mt-1.5 flex items-center gap-1.5">
      <div class="flex text-amber-400">
        <svg class="h-3.5 w-3.5 fill-current" viewBox="0 0 20 20"><path d="M10 1.6l2.59 5.25 5.79.84-4.19 4.08.99 5.77L10 14.77l-5.18 2.77.99-5.77L1.62 7.69l5.79-.84L10 1.6z" /></svg>
        <svg class="h-3.5 w-3.5 fill-current" viewBox="0 0 20 20"><path d="M10 1.6l2.59 5.25 5.79.84-4.19 4.08.99 5.77L10 14.77l-5.18 2.77.99-5.77L1.62 7.69l5.79-.84L10 1.6z" /></svg>
        <svg class="h-3.5 w-3.5 fill-current" viewBox="0 0 20 20"><path d="M10 1.6l2.59 5.25 5.79.84-4.19 4.08.99 5.77L10 14.77l-5.18 2.77.99-5.77L1.62 7.69l5.79-.84L10 1.6z" /></svg>
        <svg class="h-3.5 w-3.5 fill-current" viewBox="0 0 20 20"><path d="M10 1.6l2.59 5.25 5.79.84-4.19 4.08.99 5.77L10 14.77l-5.18 2.77.99-5.77L1.62 7.69l5.79-.84L10 1.6z" /></svg>
      </div>
    </div>

    <p class="mt-1 text-xs text-stone-400">Material: Leather</p>

    <div class="mt-auto flex items-center justify-between pt-3">
      <span class="text-xl font-extrabold text-[#3B2417]">${{ item().price }}</span>
      
      <button (click)="addToCart(item().id || '')"
        type="button" 
        class="inline-flex items-center gap-1.5 rounded-lg bg-[#4A3525] px-3 py-1.5 text-xs font-bold text-white transition-colors hover:bg-[#2A1910] active:scale-95 shadow-sm cursor-pointer">
        <svg class="h-3.5 w-3.5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
          <path stroke-linecap="round" stroke-linejoin="round" d="M3 3h2l.4 2M7 13h10l4-8H5.4M7 13L5.4 5M7 13l-2.293 2.293c-.63.63-.184 1.707.707 1.707H17m0 0a2 2 0 100 4 2 2 0 000-4zm-8 2a2 2 0 11-4 0 2 2 0 014 0z" />
        </svg>
        <span>Add</span>
      </button>
    </div>

  </div>
</div>
