<nav
  class="fixed top-0 left-0 right-0 z-50 transition-all duration-300"
  [class.shadow-md]="isScrolled()"
  [class.bg-white]="isScrolled()"
  [class.bg-[#FFFFFF]]="!isScrolled()"
>
  <div class="mx-auto lg:px-6 px-5 sm:px-6 ">
    <div class="flex items-center justify-between h-16">

      <!-- Logo -->
      <a routerLink="/" class="flex items-center gap-2 shrink-0">
        <div class="w-9 h-9 bg-[#3d2314] rounded-lg flex items-center justify-center">
          <span class="text-white font-bold text-sm tracking-tight">FZ</span>
        </div>
        <span class="text-[#3d2314] font-bold text-lg tracking-tight">FurniZone</span>
      </a>

      <!-- Desktop Nav Links -->
      <div class="hidden md:flex items-center gap-8">
        @for (link of navLinks(); track link.path) {
          <a
            [routerLink]="link.path"
            routerLinkActive="text-[#3d2314] font-semibold"
            [routerLinkActiveOptions]="{ exact: true }"
            class="text-[#5a4a3a] hover:text-[#3d2314] text-sm font-medium transition-colors duration-200"
          >
            {{ link.label }}
          </a>
        }
      </div>

      <!-- Search Bar -->
      <div class="hidden md:flex items-center flex-1 max-w-xs mx-6">
        <div class="relative w-full">
          <input
            type="text"
            placeholder="Search furniture..."
            [value]="searchQuery()"
            (input)="onSearch($event)"
            class="w-full pl-4 pr-10 py-2 rounded-full border border-[#d6c9bb] bg-white text-sm text-[#3d2314] placeholder-[#b0a090] focus:outline-none focus:ring-2 focus:ring-[#3d2314]/20 focus:border-[#3d2314] transition"
          />
          <span class="absolute right-3 top-1/2 -translate-y-1/2 text-[#b0a090]">
            <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-4.35-4.35M17 11A6 6 0 1 1 5 11a6 6 0 0 1 12 0z"/>
            </svg>
          </span>
        </div>
      </div>

      <!-- Icons + Login -->
      <div class="hidden md:flex items-center gap-4">

        <!-- Wishlist -->
       <button routerLink="/wishlist" class="relative text-[#5a4a3a] hover:text-[#3d2314] transition-colors cursor-pointer">
  <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.8"
      d="M4.318 6.318a4.5 4.5 0 000 6.364L12 20.364l7.682-7.682a4.5 4.5 0 00-6.364-6.364L12 7.636l-1.318-1.318a4.5 4.5 0 00-6.364 0z"/>
  </svg>
  
  @if (wishlistCount() > 0) {
    <span class="absolute top-0.5 right-0.5 bg-[#3d2314] rounded-full w-2 h-2 animate-ping"></span>
    <span class="absolute top-0.5 right-0.5 bg-[#3d2314] rounded-full w-2 h-2 shadow-xs"></span>
  }
</button>

        <!-- Cart -->
        <button routerLink="/cart" class="relative text-[#5a4a3a] hover:text-[#3d2314] transition-colors">
          <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.8"
              d="M3 3h2l.4 2M7 13h10l4-8H5.4M7 13L5.4 5M7 13l-2.293 2.293c-.63.63-.184 1.707.707 1.707H17m0 0a2 2 0 100 4 2 2 0 000-4zm-8 2a2 2 0 11-4 0 2 2 0 014 0z"/>
          </svg>
          @if (cartCount() > 0) {
            <span class="absolute -top-1 -right-1 bg-[#3d2314] text-white text-[10px] font-bold rounded-full w-4 h-4 flex items-center justify-center">
              {{ cartCount() }}
            </span>
          }
        </button>

        <!-- Login Button -->
        @if(isLogged())
        {
       <div class="relative flex items-center">
  
 <button 
  type="button" 
  (click)="isProfileMenuOpen.set(!isProfileMenuOpen())"
  class="flex items-center gap-1.5 rounded-xl p-2 hover:bg-stone-100 transition-colors cursor-pointer outline-none group">
  
  <svg class="h-5 w-5 text-stone-500 group-hover:text-[#3B2417] transition-colors" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
    <path stroke-linecap="round" stroke-linejoin="round" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z" />
  </svg>
  
  <svg class="h-3.5 w-3.5 text-stone-400 transition-transform duration-200" [class.rotate-180]="isProfileMenuOpen()" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
    <path stroke-linecap="round" stroke-linejoin="round" d="M19 9l-7 7-7-7" />
  </svg>
</button>
  @if (isProfileMenuOpen()) {
    <div class="fixed inset-0 z-30 cursor-default" (click)="isProfileMenuOpen.set(false)"></div>

    <div class="absolute right-0 top-full mt-2 w-56 rounded-2xl border border-stone-200 bg-white py-2 shadow-xl z-40 animate-fade-in animate-duration-150">
      
    
      <div class="py-1">
       

        <a routerLink="/myRev" (click)="isProfileMenuOpen.set(false)" class="flex items-center gap-3 px-4 py-2 text-sm font-semibold text-stone-700 hover:bg-stone-50 hover:text-[#3B2417] transition-colors">
          <svg class="h-4 w-4 text-stone-400" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
            <path stroke-linecap="round" stroke-linejoin="round" d="M7 8h10M7 12h4m1 8l-4-4H5a2 2 0 01-2-2V6a2 2 0 012-2h14a2 2 0 012 2v8a2 2 0 01-2 2h-3l-4 4z" />
          </svg>
          My Reviews
        </a>
      </div>

      <div class="border-t border-stone-100 pt-1 mt-1">
        <button 
          type="button" 
          (click)="logOut()"
          class="w-full flex items-center gap-3 px-4 py-2 text-sm font-bold text-red-600 hover:bg-red-50/60 transition-colors text-left cursor-pointer">
          <svg class="h-4 w-4 text-red-400" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
            <path stroke-linecap="round" stroke-linejoin="round" d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1" />
          </svg>
          Logout
        </button>
      </div>

    </div>
  }
</div>
        }
        @else{
            <a
          routerLink="/login"
          class="px-5 py-2 bg-[#3d2314] text-white text-sm font-semibold rounded-lg hover:bg-[#5a3520] transition-colors duration-200"
        >Login</a>  
        }
      </div>

      <!-- Mobile Menu Toggle -->
      <button
        class="md:hidden text-[#3d2314] p-2"
        (click)="toggleMenu()"
        aria-label="Toggle menu"
      >
        @if (isMenuOpen()) {
          <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/>
          </svg>
        } @else {
          <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"/>
          </svg>
        }
      </button>
    </div>

    <!-- Mobile Menu Dropdown -->
    @if (isMenuOpen()) {
      <div class="md:hidden bg-white border-t border-[#e8ddd3] py-4 px-2 space-y-1 shadow-lg">
        @for (link of navLinks(); track link.path) {
          <a
            [routerLink]="link.path"
            routerLinkActive="bg-[#f5f0eb] text-[#3d2314] font-semibold"
            class="block px-4 py-2 rounded-lg text-[#5a4a3a] hover:bg-[#f5f0eb] hover:text-[#3d2314] text-sm font-medium transition-colors"
            (click)="toggleMenu()"
          >
            {{ link.label }}
          </a>
        }
        <div class="pt-2 border-t border-[#e8ddd3]">
          <div class="relative mb-3">
            <input
              type="text"
              placeholder="Search furniture..."
              [value]="searchQuery()"
              (input)="onSearch($event)"
              class="w-full pl-4 pr-10 py-2 rounded-full border border-[#d6c9bb] bg-[#f5f0eb] text-sm text-[#3d2314] placeholder-[#b0a090] focus:outline-none focus:ring-2 focus:ring-[#3d2314]/20"
            />
            <span class="absolute right-3 top-1/2 -translate-y-1/2 text-[#b0a090]">
              <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-4.35-4.35M17 11A6 6 0 1 1 5 11a6 6 0 0 1 12 0z"/>
              </svg>
            </span>
          </div>
          <div class="flex items-center justify-between px-2">
            <div class="flex gap-4">
              <button class="relative text-[#5a4a3a]">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                  <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.8"
                    d="M4.318 6.318a4.5 4.5 0 000 6.364L12 20.364l7.682-7.682a4.5 4.5 0 00-6.364-6.364L12 7.636l-1.318-1.318a4.5 4.5 0 00-6.364 0z"/>
                </svg>
              </button>
              <button class="relative text-[#5a4a3a]">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                  <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.8"
                    d="M3 3h2l.4 2M7 13h10l4-8H5.4M7 13L5.4 5M7 13l-2.293 2.293c-.63.63-.184 1.707.707 1.707H17m0 0a2 2 0 100 4 2 2 0 000-4zm-8 2a2 2 0 11-4 0 2 2 0 014 0z"/>
                </svg>
              </button>
            </div>
            <a
              routerLink="/login"
              class="px-5 py-2 bg-[#3d2314] text-white text-sm font-semibold rounded-lg"
              (click)="toggleMenu()"
            >Login</a>
          </div>
        </div>
      </div>
    }
  </div>
</nav>
