<div class="max-w-7xl mt-15 mx-auto px-4 py-8 bg-[#F7F3EC]/30 min-h-screen">
  <h1 class="text-3xl font-extrabold text-[#3B2417] mb-1">My Wishlist</h1>
  <p class="text-sm text-stone-500 mb-8">{{ favoriteItems().length }} item(s) saved</p>

  @if (isLoading()) {
    <div class="flex justify-center py-20">
      <div class="h-10 w-10 animate-spin rounded-full border-4 border-[#3B2417] border-t-transparent"></div>
    </div>
  } @else if (favoriteItems().length === 0) {
    <div class="text-center py-20 rounded-2xl border border-dashed border-stone-300 bg-white p-8">
      <p class="text-stone-500 font-medium">Your wishlist is empty.</p>
    </div>
  } @else {
    <div class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-6">
      @for (item of favoriteItems(); track item.id) {
        <div class="group relative rounded-2xl border border-stone-200 bg-white p-4 shadow-xs transition-all hover:shadow-md">
          
          <button (click)="removeItem(item.id)" class="absolute top-6 right-6 z-10 p-2 bg-white rounded-full shadow-xs cursor-pointer text-red-500 hover:scale-110 transition-transform">
            <svg class="h-5 w-5 fill-current" viewBox="0 0 24 24">
              <path d="M12 20.5s-7.6-4.6-9.7-9.3C1.1 8.3 2.6 5.1 5.8 4.6c2-.3 3.7.7 4.7 2.2.3.4.9.4 1.1 0 1-1.5 2.7-2.5 4.7-2.2 3.2.5 4.7 3.7 3.5 6.6C19.6 15.9 12 20.5 12 20.5Z" />
            </svg>
          </button>

          <div class="aspect-square w-full overflow-hidden rounded-xl bg-stone-100 mb-4">
            <img [src]="item.productImageUrl || 'assets/placeholder.jpg'" [alt]="item.productName" class="h-full w-full object-cover transition-transform group-hover:scale-105" />
          </div>

          <span class="text-[10px] font-bold uppercase tracking-wider text-stone-400">Furniture</span>
          <h3 class="font-bold text-stone-800 text-base mt-0.5 line-clamp-1">{{ item.productName }}</h3>
          
          <div class="flex items-center gap-1 mt-1 text-amber-400">
            <svg class="h-4 w-4 fill-current" viewBox="0 0 20 20"><path d="M10 1.6l2.59 5.25 5.79.84-4.19 4.08.99 5.77L10 14.77l-5.18 2.77.99-5.77L1.62 7.69l5.79-.84L10 1.6z"/></svg>
            <span class="text-xs font-semibold text-stone-500">(112)</span>
          </div>

          <div class="flex items-center justify-between mt-4">
            <span class="text-lg font-extrabold text-[#3B2417]">${{ item.productPrice }}</span>
            <button (click)="addToCart(item)" class="inline-flex items-center gap-1.5 rounded-xl bg-[#3B2417] px-3 py-2 text-xs font-bold text-white hover:bg-[#2A1910] cursor-pointer transition-transform active:scale-95">
              <svg class="h-3.5 w-3.5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5">
                <path stroke-linecap="round" stroke-linejoin="round" d="M12 4.5v15m7.5-7.5h-15" />
              </svg>
              Add
            </button>
          </div>

        </div>
      }
    </div>
  }
</div>
