<aside class="  h-screen w-64 bg-white border-r border-gray-100 shadow-lg flex flex-col shrink-0">

  <div class="flex items-center gap-2.5 px-6 h-20 border-b border-gray-100">
    <div class="h-10 w-10 rounded-xl bg-amber-700 flex items-center justify-center shrink-0">
     <p class="text-white font-bold">FZ</p>
    </div>
    <div class="leading-tight">
      <p class="text-lg font-bold text-gray-900">Furni<span class="text-amber-700">Zone</span></p>
      <p class="text-xs text-gray-400">Admin Dashboard</p>
    </div>
  </div>

  <nav class="flex-1 overflow-y-auto px-4 py-6 space-y-1.5">
    @for (item of navItems; track item.route) {
      <a
        [routerLink]="item.route"
        routerLinkActive="bg-amber-700 text-white shadow-lg shadow-amber-700/20"
        [routerLinkActiveOptions]="{ exact: false }"
        class="flex items-center gap-3 px-4 py-2.5 rounded-xl text-sm font-medium text-gray-600 hover:bg-amber-50 hover:text-amber-700 transition-colors"
      >
        <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 shrink-0" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
          <path stroke-linecap="round" stroke-linejoin="round" [attr.d]="item.icon" />
        </svg>
        {{ item.label }}
      </a>
    }
  </nav>

  <div class="px-4 py-4 border-t border-gray-100 space-y-4">
    <button 
      (click)="logout()" 
      class="w-full flex items-center gap-3 px-4 py-2.5 rounded-xl text-sm font-medium text-red-600 hover:bg-red-50 hover:text-red-700 transition-colors cursor-pointer"
    >
      <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 shrink-0" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.5">
        <path stroke-linecap="round" stroke-linejoin="round" d="M15.75 9V5.25A2.25 2.25 0 0013.5 3h-6a2.25 2.25 0 00-2.25 2.25v13.5A2.25 2.25 0 007.5 21h6a2.25 2.25 0 002.25-2.25V15M12 9l-3 3m0 0l3 3m-3-3h12.75" />
      </svg>
      Logout
    </button>

    <p class="text-xs text-gray-400 px-2">&copy; 2026 FurniZone</p>
  </div>
</aside>
